<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光轴 - 小倩的成长日记 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #E89BAA;
            --primary-deep: #D67B8C;
            --primary-light: #F5BBC6;
            --primary-soft: #FCE0E5;
            --sky-blue: #87CEEB;
            --sky-light: #B8E0F0;
            --leaf-green: #8FBC8F;
            --bg-cream: #FFFCF8;
            --text-primary: #5A4A4A;
            --text-secondary: #8A7A7A;
            --border-radius: 18px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #E8F4F8 0%, #FFF5F7 50%, #FFF0E8 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }
        
        /* 顶部导航 */
        .top-nav {
            background: linear-gradient(90deg, #87CEEB 0%, #A8D8EA 50%, #E89BAA 100%);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(135, 206, 235, 0.3);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5em;
            color: white;
            font-weight: bold;
            text-decoration: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.95em;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.25);
        }
        
        /* 主容器 */
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--border-radius);
            box-shadow: 0 6px 25px rgba(232, 155, 170, 0.15);
        }
        
        .page-title {
            font-size: 2em;
            color: var(--primary-deep);
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
        }
        
        /* 统计卡片 */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.93);
            padding: 25px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: 0 6px 25px rgba(232, 155, 170, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.9);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary-deep);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        /* 日历视图 */
        .calendar-section {
            background: rgba(255, 255, 255, 0.93);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 6px 25px rgba(232, 155, 170, 0.12);
        }
        
        .section-title {
            font-size: 1.3em;
            color: var(--primary-deep);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .calendar-nav {
            display: flex;
            gap: 10px;
        }
        
        .calendar-btn {
            background: var(--primary-soft);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .calendar-btn:hover {
            background: var(--primary-light);
        }
        
        .calendar-month {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        
        .calendar-weekday {
            text-align: center;
            padding: 10px;
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background: #f9f9f9;
        }
        
        .calendar-day:hover {
            background: var(--primary-soft);
            transform: scale(1.05);
        }
        
        .calendar-day.other-month {
            color: #ccc;
            background: transparent;
        }
        
        .calendar-day.has-content {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-soft) 100%);
            color: white;
            font-weight: bold;
        }
        
        .calendar-day.has-content::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--primary-deep);
            border-radius: 50%;
        }
        
        .calendar-day.today {
            border: 2px solid var(--primary);
        }
        
        .calendar-day-number {
            font-size: 0.95em;
        }
        
        .calendar-day-count {
            font-size: 0.7em;
            margin-top: 2px;
            opacity: 0.8;
        }
        
        /* 时光轴 */
        .timeline-section {
            background: rgba(255, 255, 255, 0.93);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: 0 6px 25px rgba(232, 155, 170, 0.12);
        }
        
        .timeline-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: var(--primary-soft);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            color: var(--text-primary);
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .timeline-container {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--primary-light) 0%, var(--sky-blue) 100%);
            border-radius: 3px;
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            padding-left: 25px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 5px;
            width: 14px;
            height: 14px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 50%;
            z-index: 1;
        }
        
        .timeline-item.important::before {
            background: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        
        .timeline-date {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .timeline-date-badge {
            background: var(--primary-soft);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.85em;
            color: var(--primary-deep);
        }
        
        .timeline-content {
            background: linear-gradient(135deg, #f9f9f9 0%, #fff 100%);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--primary);
        }
        
        .timeline-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .timeline-text {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .timeline-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .timeline-tag {
            background: var(--primary-soft);
            color: var(--primary-deep);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8em;
        }
        
        .timeline-meta {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            font-size: 0.85em;
            color: var(--text-secondary);
        }
        
        .timeline-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* 快速跳转 */
        .jump-section {
            margin-top: 30px;
            padding: 20px;
            background: var(--primary-soft);
            border-radius: var(--border-radius);
            text-align: center;
        }
        
        .jump-title {
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        
        .jump-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .jump-btn {
            background: white;
            border: 2px solid var(--primary-light);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            color: var(--text-primary);
        }
        
        .jump-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 加载更多 */
        .load-more {
            text-align: center;
            margin-top: 30px;
        }
        
        .load-more-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .load-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(232, 155, 170, 0.4);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 1.1em;
        }
        
        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--sky-blue) 100%);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5em;
            box-shadow: 0 4px 15px rgba(232, 155, 170, 0.4);
            transition: all 0.3s;
            opacity: 0;
            visibility: hidden;
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            margin-top: 40px;
        }
        
        footer p {
            margin: 5px 0;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
            }
            
            .nav-links a {
                padding: 5px 10px;
                font-size: 0.85em;
            }
            
            .main-container {
                padding: 20px 15px;
            }
            
            .page-title {
                font-size: 1.5em;
            }
            
            .timeline-container {
                padding-left: 20px;
            }
            
            .calendar-grid {
                gap: 4px;
            }
            
            .calendar-day {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">🌸 小倩的空间</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="timeline.html" class="active">时光轴</a>
                <a href="diary/">日记</a>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">🕐 时光轴</h1>
            <p class="page-subtitle">记录每一个成长的瞬间 · 回顾走过的每一步</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-icon">📔</div>
                <div class="stat-number" id="total-posts">0</div>
                <div class="stat-label">总记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-number" id="total-days">0</div>
                <div class="stat-label">记录天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-number" id="streak-days">0</div>
                <div class="stat-label">连续记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌸</div>
                <div class="stat-number" id="first-date">-</div>
                <div class="stat-label">开始日期</div>
            </div>
        </div>

        <!-- 日历视图 -->
        <div class="calendar-section">
            <h2 class="section-title">📅 成长日历</h2>
            <div class="calendar-header">
                <div class="calendar-nav">
                    <button class="calendar-btn" id="prev-month">◀</button>
                    <button class="calendar-btn" id="today-btn">今天</button>
                    <button class="calendar-btn" id="next-month">▶</button>
                </div>
                <div class="calendar-month" id="current-month">2026年3月</div>
            </div>
            <div class="calendar-grid" id="calendar">
                <!-- 日历由 JS 生成 -->
            </div>
        </div>

        <!-- 时光轴 -->
        <div class="timeline-section">
            <h2 class="section-title">📜 时间线</h2>
            <div class="timeline-filter">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="shuoshuo">说说</button>
                <button class="filter-btn" data-filter="diary">日记</button>
                <button class="filter-btn" data-filter="guestbook">留言</button>
            </div>
            <div class="timeline-container" id="timeline">
                <!-- 时间线由 JS 生成 -->
            </div>
            <div class="load-more" id="load-more">
                <button class="load-more-btn">加载更多</button>
            </div>
        </div>

        <!-- 快速跳转 -->
        <div class="jump-section">
            <div class="jump-title">🚀 快速跳转</div>
            <div class="jump-buttons">
                <button class="jump-btn" data-jump="today">今天</button>
                <button class="jump-btn" data-jump="week">本周</button>
                <button class="jump-btn" data-jump="month">本月</button>
                <button class="jump-btn" data-jump="first">最开始</button>
                <button class="jump-btn" data-jump="latest">最新</button>
            </div>
        </div>
    </div>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="back-to-top">↑</button>

    <!-- 页脚 -->
    <footer>
        <p>🌸 小倩的成长空间 · 秋日樱花 · 向阳而生 🌻</p>
        <p>每日 00:00 自动更新 · Powered by Coze</p>
    </footer>

    <script src="timeline.js"></script>
</body>
</html>
